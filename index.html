<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>超维 ERP - AI自动上品管理系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f7fa; color: #333; }
    .hidden { display: none !important; }
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; }
    .login-box { width: 400px; background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); padding: 36px 32px; }
    .login-box .logo { text-align: center; margin-bottom: 28px; }
    .login-box .logo h1 { font-size: 28px; color: #667eea; margin-bottom: 6px; }
    .login-box .logo p { font-size: 13px; color: #999; }
    .login-tabs { display: flex; border-bottom: 1px solid #f0f0f0; margin-bottom: 24px; }
    .login-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-size: 14px; color: #666; border-bottom: 2px solid transparent; transition: all .2s; }
    .login-tab.active { color: #667eea; font-weight: bold; border-bottom-color: #667eea; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    .form-group input { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 11px 14px; font-size: 14px; outline: none; transition: border .2s; }
    .form-group input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,.1); }
    .btn { border: none; border-radius: 8px; padding: 11px 16px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all .2s; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-danger { background: #ff4d4f; color: #fff; }
    .btn-default { background: #f0f0f0; color: #333; }
    .btn-full { width: 100%; padding: 13px; font-size: 15px; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .alert { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px; }
    .alert-error { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
    .alert-success { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .alert-info { background: #e6f4ff; color: #1677ff; border: 1px solid #91caff; }
    .alert-warning { background: #fffbe6; color: #faad14; border: 1px solid #ffe58f; }
    .main-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: #1a1a2e; color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-logo { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .sidebar-logo h1 { font-size: 18px; font-weight: bold; background: linear-gradient(135deg, #a78bfa, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sidebar-logo p { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 4px; }
    .sidebar-menu { flex: 1; padding: 12px 0; overflow-y: auto; }
    .menu-item { display: flex; align-items: center; gap: 10px; padding: 12px 20px; cursor: pointer; color: rgba(255,255,255,.6); font-size: 14px; transition: all .2s; border-left: 3px solid transparent; }
    .menu-item:hover { background: rgba(255,255,255,.06); color: #fff; }
    .menu-item.active { background: rgba(102,126,234,.2); color: #a78bfa; border-left-color: #a78bfa; }
    .menu-item .icon { font-size: 16px; flex-shrink: 0; }
    .sidebar-user { padding: 16px; border-top: 1px solid rgba(255,255,255,.08); }
    .sidebar-user .name { color: #fff; font-size: 14px; font-weight: bold; margin-bottom: 4px; }
    .sidebar-user .role { font-size: 11px; color: rgba(255,255,255,.4); margin-bottom: 10px; }
    .sidebar-user .logout { font-size: 12px; color: #a78bfa; cursor: pointer; }
    .sidebar-user .logout:hover { color: #fff; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .page-header { background: #fff; border-bottom: 1px solid #f0f0f0; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .page-header h2 { font-size: 20px; color: #333; }
    .page-body { flex: 1; padding: 24px; overflow-y: auto; }
    .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.05); margin-bottom: 16px; }
    .card-title { font-size: 16px; font-weight: bold; margin-bottom: 16px; color: #333; display: flex; align-items: center; gap: 8px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.05); }
    .stat-card .label { font-size: 13px; color: #999; margin-bottom: 8px; }
    .stat-card .value { font-size: 32px; font-weight: bold; color: #667eea; }
    .stat-card .sub { font-size: 12px; color: #999; margin-top: 4px; }
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #f0f0f0; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #fafafa; color: #666; text-align: left; padding: 12px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; font-weight: 600; }
    td { padding: 12px; border-bottom: 1px solid #f5f5f5; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafffe; }
    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .tag-success { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .tag-error { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
    .tag-loading { background: #e6f4ff; color: #1677ff; border: 1px solid #91caff; }
    .tag-warning { background: #fffbe6; color: #faad14; border: 1px solid #ffe58f; }
    .tag-admin { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
    .tag-user { background: #f0f5ff; color: #667eea; border: 1px solid #c7d2fe; }
    .task-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; margin-bottom: 12px; transition: box-shadow .2s; }
    .task-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
    .task-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .task-title { font-size: 14px; font-weight: 600; color: #333; line-height: 1.4; flex: 1; margin-right: 12px; }
    .task-steps { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .task-step { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #f5f5f5; color: #999; }
    .task-step.done { background: #f6ffed; color: #52c41a; }
    .task-step.active { background: #e6f4ff; color: #1677ff; }
    .task-step.error { background: #fff2f0; color: #ff4d4f; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .empty { text-align: center; padding: 60px 20px; color: #999; }
    .empty .icon { font-size: 48px; margin-bottom: 16px; }
    .empty p { font-size: 14px; }
    .progress-bar { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; margin-top: 8px; }
    .progress-bar .fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 3px; transition: width .3s; }
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }
      .form-row-3 { grid-template-columns: 1fr; }
      .sidebar { width: 60px; }
      .sidebar .menu-item span.txt { display: none; }
      .sidebar-logo p, .sidebar-user .name, .sidebar-user .role, .sidebar-user .logout { display: none; }
    }
  </style>
</head>
<body>

<div id="loginPage" class="login-page">
  <div class="login-box">
    <div class="logo">
      <h1>🤖 超维 ERP</h1>
      <p>AI自动上品 · 1688 → Ozon</p>
    </div>
    <div class="login-tabs">
      <div class="login-tab active" onclick="switchTab('login')">登录</div>
      <div class="login-tab" onclick="switchTab('register')">注册</div>
    </div>
    <div id="loginForm">
      <div class="form-group"><label>用户名</label><input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="username" /></div>
      <div class="form-group"><label>密码</label><input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password" /></div>
      <div id="loginAlert"></div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">登录</button>
    </div>
    <div id="registerForm" class="hidden">
      <div class="form-group"><label>用户名</label><input type="text" id="regUser" placeholder="请输入用户名" autocomplete="username" /></div>
      <div class="form-group"><label>密码</label><input type="password" id="regPass" placeholder="至少6位" autocomplete="new-password" /></div>
      <div class="form-group"><label>邀请码</label><input type="text" id="regCode" placeholder="没有可不填" /></div>
      <div id="regAlert"></div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">注册</button>
    </div>
  </div>
</div>

<div id="mainLayout" class="main-layout hidden">
  <div class="sidebar">
    <div class="sidebar-logo">
      <h1>超维ERP</h1>
      <p>AI自动上品系统</p>
    </div>
    <div class="sidebar-menu">
      <div class="menu-item active" onclick="switchPage('dashboard')"><span class="icon">📊</span><span class="txt">数据概览</span></div>
      <div class="menu-item" onclick="switchPage('tasks')"><span class="icon">🤖</span><span class="txt">上品任务</span></div>
      <div class="menu-item" onclick="switchPage('history')"><span class="icon">📋</span><span class="txt">上品记录</span></div>
      <div class="menu-item" onclick="switchPage('stores')"><span class="icon">🏪</span><span class="txt">店铺管理</span></div>
      <div class="menu-item" onclick="switchPage('watermark')"><span class="icon">🎨</span><span class="txt">水印配置</span></div>
      <div class="menu-item" onclick="switchPage('imagetools')"><span class="icon">🖼️</span><span class="txt">图片管理</span></div>
      <div class="menu-item hidden" id="adminMenu" onclick="switchPage('admin')"><span class="icon">👥</span><span class="txt">用户管理</span></div>
      <div class="menu-item" onclick="switchPage('autopick')"><span class="icon">🎯</span><span class="txt">自动选品</span></div>
      <div class="menu-item" onclick="switchPage('download')"><span class="icon">📦</span><span class="txt">下载插件</span></div>
    </div>
    <div class="sidebar-user">
      <div class="name" id="sidebarName">-</div>
      <div class="role" id="sidebarRole"></div>
      <div class="logout" onclick="doLogout()">退出登录</div>
    </div>
  </div>
  <div class="main-content">
    <div class="page-header">
      <h2 id="pageTitle">📊 数据概览</h2>
      <div id="pageActions"></div>
    </div>
    <div class="page-body" id="pageBody"></div>
  </div>
</div>

<script>
var API_URL = "https://api.ozonerp.chaowei.online";
var currentToken = localStorage.getItem("erp_token");
var currentUser = null;
var taskPollingTimer = null;

var _pendingBridgeCallbacks = {};
var _bridgeCallbackId = 0;

function sendToExtension(msg, callback) {
  var cbId = "_cb_" + (++_bridgeCallbackId) + "_" + Date.now();
  msg._bridgeCallbackId = cbId;
  if (callback) {
    _pendingBridgeCallbacks[cbId] = callback;
    setTimeout(function() { delete _pendingBridgeCallbacks[cbId]; }, 30000);
  }
  window.postMessage({ source: "erp-web", type: "erp-bridge-call", payload: msg }, "*");
}

window.addEventListener("message", function(e) {
  if (!e.data || e.data.source !== "erp-extension") return;
  if (e.data.type === "erp-bridge-response" && e.data._bridgeCallbackId) {
    var cb = _pendingBridgeCallbacks[e.data._bridgeCallbackId];
    if (cb) {
      delete _pendingBridgeCallbacks[e.data._bridgeCallbackId];
      cb(e.data.result);
    }
    return;
  }
  if (e.data.type === "erp-extension-ready") {
    if (currentToken) {
      window.postMessage({ source: "erp-web", type: "erp-login", token: currentToken, user: currentUser }, "*");
    } else {
      window.postMessage({ source: "erp-web", type: "erp-check-auth" }, "*");
    }
  }
  if (e.data.type === "erp-auth-status" && e.data.loggedIn && e.data.token && !currentToken) {
    currentToken = e.data.token;
    localStorage.setItem("erp_token", currentToken);
    loadUser().then(function() { if (currentUser) showMain(); });
  }
});

function api(path, options) {
  options = options || {};
  var headers = { "Content-Type": "application/json" };
  if (currentToken) headers["Authorization"] = "Bearer " + currentToken;
  return fetch(API_URL + path, {
    method: options.method || "GET",
    headers: headers,
    body: options.body ? JSON.stringify(options.body) : undefined
  }).then(function(r) { return r.json(); });
}

function escapeHtml(s) {
  return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function switchTab(tab) {
  document.querySelectorAll(".login-tab").forEach(function(t, i) {
    t.classList.toggle("active", (tab === "login" && i === 0) || (tab === "register" && i === 1));
  });
  document.getElementById("loginForm").classList.toggle("hidden", tab !== "login");
  document.getElementById("registerForm").classList.toggle("hidden", tab !== "register");
}

function doLogin() {
  var u = document.getElementById("loginUser").value.trim();
  var p = document.getElementById("loginPass").value.trim();
  var a = document.getElementById("loginAlert");
  if (!u || !p) { a.innerHTML = '<div class="alert alert-error">请填写用户名和密码</div>'; return; }
  a.innerHTML = '<div class="alert alert-info">登录中...</div>';
  fetch(API_URL + "/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username: u, password: p })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.code === 0) {
      currentToken = d.data.token;
      localStorage.setItem("erp_token", currentToken);
      try { window.postMessage({ source: "erp-web", type: "erp-login", token: d.data.token, user: d.data.user }, "*"); } catch(e) {}
      loadUser().then(function() { showMain(); });
    } else {
      a.innerHTML = '<div class="alert alert-error">' + escapeHtml(d.msg || "登录失败") + '</div>';
    }
  });
}

function doRegister() {
  var u = document.getElementById("regUser").value.trim();
  var p = document.getElementById("regPass").value.trim();
  var c = document.getElementById("regCode").value.trim();
  var a = document.getElementById("regAlert");
  if (!u || !p) { a.innerHTML = '<div class="alert alert-error">请填写用户名和密码</div>'; return; }
  if (p.length < 6) { a.innerHTML = '<div class="alert alert-error">密码至少6位</div>'; return; }
  a.innerHTML = '<div class="alert alert-info">注册中...</div>';
  fetch(API_URL + "/auth/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username: u, password: p, inviteCode: c })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.code === 0) {
      a.innerHTML = '<div class="alert alert-success">注册成功！</div>';
      setTimeout(function() { switchTab("login"); }, 1000);
    } else {
      a.innerHTML = '<div class="alert alert-error">' + escapeHtml(d.msg || "注册失败") + '</div>';
    }
  });
}

function doLogout() {
  localStorage.removeItem("erp_token");
  currentToken = null;
  currentUser = null;
  try { window.postMessage({ source: "erp-web", type: "erp-logout" }, "*"); } catch(e) {}
  document.getElementById("mainLayout").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
  if (taskPollingTimer) { clearInterval(taskPollingTimer); taskPollingTimer = null; }
  if (window._autoPickPollingTimer) { clearInterval(window._autoPickPollingTimer); window._autoPickPollingTimer = null; }
}

function loadUser() {
  return api("/auth/me").then(function(d) {
    if (d.code !== 0) { doLogout(); return; }
    currentUser = d.data;
    document.getElementById("sidebarName").textContent = currentUser.username;
    document.getElementById("sidebarRole").innerHTML = currentUser.role === "admin"
      ? '<span class="tag tag-admin">管理员</span>'
      : '<span class="tag tag-user">用户</span>';
    document.getElementById("adminMenu").classList.toggle("hidden", currentUser.role !== "admin");
  });
}

function showMain() {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("mainLayout").classList.remove("hidden");
  switchPage("dashboard");
}

function switchPage(page) {
  document.querySelectorAll(".menu-item").forEach(function(el) { el.classList.remove("active"); });
  var activeItem = document.querySelector('.menu-item[onclick="switchPage(\'' + page + '\')"]');
  if (activeItem) activeItem.classList.add("active");
  var titles = {
    dashboard: "📊 数据概览", tasks: "🤖 上品任务", history: "📋 上品记录",
    stores: "🏪 店铺管理", watermark: "🎨 水印配置", imagetools: "🖼️ 图片管理",
    admin: "👥 用户管理", download: "📦 下载插件", autopick: "🎯 自动选品"
  };
  document.getElementById("pageTitle").textContent = titles[page] || page;
  document.getElementById("pageActions").innerHTML = "";
  if (taskPollingTimer) { clearInterval(taskPollingTimer); taskPollingTimer = null; }
  if (window._autoPickPollingTimer) { clearInterval(window._autoPickPollingTimer); window._autoPickPollingTimer = null; }
  if (page === "dashboard") renderDashboard();
  else if (page === "tasks") renderTasks();
  else if (page === "history") renderHistory();
  else if (page === "stores") renderStores();
  else if (page === "watermark") renderWatermark();
  else if (page === "imagetools") renderImageTools();
  else if (page === "admin") renderAdmin();
  else if (page === "download") renderDownload();
  else if (page === "autopick") renderAutoPick();
}

function statusTag(status) {
  var map = {
    "completed": '<span class="tag tag-success">✅ 成功</span>',
    "failed": '<span class="tag tag-error">❌ 失败</span>',
    "loading": '<span class="tag tag-loading">⏳ 处理中</span>',
    "error": '<span class="tag tag-error">❌ 错误</span>',
    "done": '<span class="tag tag-success">✅ 完成</span>'
  };
  return map[status] || '<span class="tag tag-warning">⏳ ' + escapeHtml(status || "未知") + '</span>';
}

function renderDashboard() {
  var body = document.getElementById("pageBody");
  body.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">加载中...</div>';
  Promise.all([api("/erp/history"), api("/user/stores")]).then(function(results) {
    var history = results[0].data || [];
    var stores = results[1].data || [];
    var today = new Date().toISOString().slice(0, 10);
    var todayCount = history.filter(function(h) { return (h.createdAt || "").startsWith(today); }).length;
    var successCount = history.filter(function(h) { return h.status === "completed"; }).length;
    var failCount = history.filter(function(h) { return h.status === "failed"; }).length;
    body.innerHTML = '<div class="stats-grid"><div class="stat-card"><div class="label">今日上品</div><div class="value">' + todayCount + '</div><div class="sub">件商品</div></div><div class="stat-card"><div class="label">总上品数</div><div class="value">' + history.length + '</div><div class="sub">成功 ' + successCount + ' 件</div></div><div class="stat-card"><div class="label">失败数量</div><div class="value" style="color:#ff4d4f;">' + failCount + '</div><div class="sub">需要处理</div></div><div class="stat-card"><div class="label">店铺数量</div><div class="value">' + stores.length + '</div><div class="sub">最多15个</div></div></div><div class="card"><div class="card-title">📋 最近上品记录</div>' + (history.length === 0 ? '<div class="empty"><div class="icon">📭</div><p>暂无记录</p></div>' : '<div class="table-wrap"><table><thead><tr><th>商品标题</th><th>店铺</th><th>价格</th><th>状态</th><th>来源</th><th>时间</th></tr></thead><tbody>' + history.slice(0, 8).map(function(i) { return '<tr><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(i.title || i.offerId || "-") + '</td><td>' + escapeHtml(i.storeName || "-") + '</td><td>' + (i.price ? "¥" + i.price : "-") + '</td><td>' + statusTag(i.status) + '</td><td>' + (i.source === "1688" ? "🛒 1688" : "📦 其他") + '</td><td>' + (i.createdAt || "").replace("T", " ").slice(0, 16) + '</td></tr>'; }).join("") + '</tbody></table></div>') + '</div><div class="card"><div class="card-title">💡 使用说明</div><div class="alert alert-info" style="line-height:2;">① 安装插件 → ② 打开 1688 商品页 → ③ 点击右侧「🤖 AI上品」按钮<br>→ ④ 选择店铺和价格倍数 → ⑤ 点击开始 → ⑥ 全自动处理（AI翻译+生成图片+上传Ozon）<br>→ ⑦ 在此页面查看进度和结果</div></div>';
  });
}

function renderTasks() {
  var body = document.getElementById("pageBody");
  body.innerHTML = '<div class="card"><div class="card-title">🤖 实时上品任务</div><div class="alert alert-info" style="margin-bottom:16px;">任务每5秒自动刷新，完成后自动停止</div><div class="toolbar"><button class="btn btn-default btn-sm" onclick="renderTasks()">🔄 刷新</button></div><div id="task-list"><div style="text-align:center;padding:30px;color:#999;">⏳ 加载中...</div></div></div>';
  loadTasks();
  if (taskPollingTimer) clearInterval(taskPollingTimer);
  taskPollingTimer = setInterval(loadTasks, 5000);

function saveWm() {
  var idx = parseInt(document.getElementById("wmEditIdx").value);
  var name = document.getElementById("wmName").value.trim();
  var position = document.getElementById("wmPosition").value;
  var size = parseInt(document.getElementById("wmSize").value);

  var file = document.getElementById("wmFile").files[0];
  function doSave(img) {
    var wms = window._wmList || [];
    var item = {
      id: (idx >= 0 && wms[idx]) ? wms[idx].id : Date.now().toString(36),
      name: name, imageBase64: img, position: position,
      size: size, opacity: opacity, padding: padding

      else { a.innerHTML = '<div class="alert alert-error">❌ ' + escapeHtml(r.msg) + '</div>'; }
    });
  }
  if (file) {
    var reader = new FileReader();
    reader.onload = function(e) { doSave(e.target.result); };
    reader.readAsDataURL(file);
  } else if (pi && pi.src && pi.src.startsWith("data:")) {
    doSave(pi.src);
  } else if (idx >= 0 && window._wmList[idx] && window._wmList[idx].imageBase64) {

}

async function loadOzonCategoriesFromGithub() {
  if (ozonCategoriesFlatList.length > 0) return;
  var container = document.getElementById("ap-cat-tree-container");
  if (!container) return;
  container.innerHTML = '<div style="color:#667eea;font-size:12px;padding:10px;">⏳ 正在加载类目树...</div>';
  
  var urls = [
    "https://cdn.jsdelivr.net/gh/qq155630/leimu@main/ozon_%E7%9C%9F%E5%AE%9E%E4%BD%A3%E9%87%91_%E5%AE%8C%E6%95%B4%E7%89%88%20-%20%E5%89%AF%E6%9C%AC.TSV",
    "https://raw.githubusercontent.com/qq155630/leimu/main/ozon_%E7%9C%9F%E5%AE%9E%E4%BD%A3%E9%87%91_%E5%AE%8C%E6%95%B4%E7%89%88%20-%20%E5%89%AF%E6%9C%AC.TSV"
  ];
  
  var text = null;
  
  for (var i = 0; i < urls.length; i++) {
    try {
      console.log("🔄 加载链接 " + (i + 1));
      var res = await fetch(urls[i]);
      if (!res.ok) continue;
      
      var buffer = await res.arrayBuffer();
      console.log("✅ 文件大小:", buffer.byteLength);
      
      // 尝试多种编码
      var decoders = ["utf-8", "gbk", "gb2312", "big5"];
      var validText = null;
      
      for (var d = 0; d < decoders.length; d++) {
        try {
          var decoder = new TextDecoder(decoders[d], { fatal: false });
          var decoded = decoder.decode(buffer);
          var sample = decoded.substring(0, 200);
          var chineseCount = (sample.match(/[\u4e00-\u9fa5]/g) || []).length;
          
          if (chineseCount > 5) {
            console.log("✅ 使用编码:", decoders[d]);
            validText = decoded;
            break;
          }
        } catch(e) {}
      }
      
      if (validText) {
        text = validText;
        break;
      }
    } catch(e) {
      console.warn("链接失败:", e.message);
    }
  }
  
  if (!text) {
    container.innerHTML = '<div style="color:red;">❌ 加载失败</div>';
    return;
  }
  
  // 自动检测分隔符
  var firstLine = text.split(/\r?\n/)[0];
  var separator = "\t";
  if (firstLine.indexOf("\t") === -1 && firstLine.indexOf(",") > 0) {
    separator = ",";
  }
  
  var lines = text.split(/\r?\n/).filter(Boolean);
  lines.shift(); // 跳过表头
  
  var tree = {};
  var flatList = [];
  var skipCount = 0;
  
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var cols = line.split(separator);
    
    if (cols.length < 5) {
      skipCount++;
      continue;
    }
    
    var c1 = (cols[0] || "").trim();
    var c2 = (cols[1] || "").trim();
    var c3 = (cols[2] || "").trim();
    var catId = (cols[3] || "").trim();
    var typeId = (cols[4] || "").trim();
    
    // ⭐ 严格的数据验证
    // 跳过空的或异常的类目名
    if (!c1 || c1.length < 1 || c1.length > 50) { skipCount++; continue; }
    if (c1 === '"' || c1 === "''" || c1 === "-") { skipCount++; continue; }
    if (!c2 || c2.length > 50) { skipCount++; continue; }
    
    // 跳过 ID 异常的
    if (!catId || !typeId) { skipCount++; continue; }
    if (catId.length < 3 || typeId.length < 3) { skipCount++; continue; }
    if (!/^\d+$/.test(catId) || !/^\d+$/.test(typeId)) { skipCount++; continue; }
    
    // 名称检查
    var name = c3 || c2;
    if (!name || name.length < 1 || name.length > 100) { skipCount++; continue; }
    
    if (!tree[c1]) tree[c1] = {};
    if (!tree[c1][c2]) tree[c1][c2] = [];
    
    tree[c1][c2].push({ name: name, c1: c1, c2: c2, c3: c3, categoryId: catId, typeId: typeId });
    flatList.push({ name: name, c1: c1, c2: c2, c3: c3, categoryId: catId, typeId: typeId });
  }
  
  console.log("📊 有效条数:", flatList.length, "跳过:", skipCount);
  
  if (flatList.length === 0) {
    container.innerHTML = '<div style="color:red;">❌ 解析失败</div>';
    return;
  }
  
  ozonCategoriesTree = tree;
  ozonCategoriesFlatList = flatList;
  console.log("✅ 成功加载", flatList.length, "个类目");
  renderCategoryTreeUI();
}

function updatePricePreviewAP() {
  var minPrice = parseFloat((document.getElementById("ap-min-price") || {}).value) || 0;
  var maxPrice = parseFloat((document.getElementById("ap-max-price") || {}).value) || 0;
  var profitRate = parseFloat((document.getElementById("ap-profit-rate") || {}).value) / 100 || 0.30;
  if (profitRate < 0.15) profitRate = 0.15;
  var exchangeRate = parseFloat((document.getElementById("ap-exchange-rate") || {}).value) || 13;
  var shippingType = (document.getElementById("ap-shipping-type") || {}).value || "air";
  var defaultWeight = parseFloat((document.getElementById("ap-default-weight") || {}).value) || 0.5;
  var previewEl = document.getElementById("ap-price-preview");
  if (!previewEl) return;
  if (!minPrice && !maxPrice) { previewEl.style.display = "none"; return; }
  var shippingCostPerKg = shippingType === "sea" ? 15 : (shippingType === "land" ? 20 : 35);
  var shippingCost = defaultWeight * shippingCostPerKg;
  var labelFee = 2;
  var divisor = 1 - 0.17 - 0.08 - 0.05 - 0.012 - profitRate;
  function calcPrice(costCny) {
    if (!costCny || divisor <= 0) return 0;
    return Math.ceil((costCny + shippingCost + labelFee) * exchangeRate / divisor);
  }
  var lines = [];
  lines.push("按默认重量 " + defaultWeight + "kg 计算，头程运费约 ¥" + shippingCost.toFixed(1) + "/件，贴单费 ¥" + labelFee);
  if (minPrice > 0) { var p1 = calcPrice(minPrice); lines.push("进价 ¥" + minPrice + " → 上架约 <b>" + p1 + " RUB</b> (≈¥" + Math.ceil(p1 / exchangeRate) + ")"); }
  if (maxPrice > 0) { var p2 = calcPrice(maxPrice); lines.push("进价 ¥" + maxPrice + " → 上架约 <b>" + p2 + " RUB</b> (≈¥" + Math.ceil(p2 / exchangeRate) + ")"); }
  lines.push("佣金17% + 物流8% + 尾程5% + 提现1.2% + 贴单¥2 + 利润" + (profitRate * 100).toFixed(0) + "%");
  previewEl.style.display = "block";
  previewEl.innerHTML = lines.join("<br>");
}

  var alertEl = document.getElementById("ap-alert");
  if (loginResultEl && loginResultEl.dataset.status === "not_logged") {
    alertEl.innerHTML = '<div class="alert alert-error">❌ 请先登录1688！<a href="https://www.1688.com" target="_blank" style="margin-left:8px;color:#ff4d4f;font-weight:bold;">→ 去登录</a></div>';
    return;
  }
  if (loginResultEl && loginResultEl.dataset.status === "unknown") {
    alertEl.innerHTML = '<div class="alert alert-warning">⚠️ 建议先点击「检测」确认1688已登录</div>';
  }
  var checkedLeaves = Array.from(document.querySelectorAll(".ap-cat-leaf:checked")).map(function(cb) {
    var parts = cb.value.split("|");
    return { keyword: parts[0] || "", categoryId: parts[1] || "", typeId: parts[2] || "" };
  }).filter(function(item) { return item.keyword && item.categoryId && item.typeId; });
  var storeIds = Array.from(document.querySelectorAll(".ap-store-cb:checked")).map(function(cb) { return cb.value; });
  if (!checkedLeaves.length) { alertEl.innerHTML = '<div class="alert alert-error">❌ 请至少勾选一个三级类目</div>'; return; }
  if (!storeIds.length) { alertEl.innerHTML = '<div class="alert alert-error">❌ 请选择至少一个店铺</div>'; return; }
  var minPrice = parseFloat(document.getElementById("ap-min-price").value) || 0;
  var maxPrice = parseFloat(document.getElementById("ap-max-price").value) || 0;
  if (maxPrice > 0 && minPrice > maxPrice) { alertEl.innerHTML = '<div class="alert alert-error">❌ 最低价不能大于最高价</div>'; return; }
  var profitRate = Math.max(parseFloat(document.getElementById("ap-profit-rate").value) / 100 || 0.30, 0.15);
  var exchangeRate = parseFloat(document.getElementById("ap-exchange-rate").value) || 13;
  var shippingType = document.getElementById("ap-shipping-type").value || "air";
  var defaultWeight = parseFloat(document.getElementById("ap-default-weight").value) || 0.5;
  var maxCount = parseInt(document.getElementById("ap-max-count").value) || 5;
  var styleHint = (document.getElementById("ap-style-hint").value || "").trim();
  var genDalle = document.getElementById("ap-gen-dalle").checked;
  alertEl.innerHTML = '<div class="alert alert-info">⏳ 正在启动，共 ' + checkedLeaves.length + ' 个类目...</div>';
  var config = {
    targetCategories: checkedLeaves, minPrice: minPrice, maxPrice: maxPrice,
    maxCount: maxCount, profitRate: profitRate, exchangeRate: exchangeRate,
    shippingType: shippingType, defaultWeight: defaultWeight,
    styleHint: styleHint, genDalle: genDalle, storeIds: storeIds
  };
  sendToExtension({ action: "startAutoPickTask", config: config }, function(res) {
    if (res && res.success) {
      alertEl.innerHTML = '<div class="alert alert-success">✅ 已启动！插件正在后台自动处理，请勿关闭浏览器。</div>';
      document.getElementById("ap-status-card").style.display = "block";
      if (window._autoPickPollingTimer) clearInterval(window._autoPickPollingTimer);
      window._autoPickPollingTimer = setInterval(refreshAutoPickStatus, 3000);
    } else {
      alertEl.innerHTML = '<div class="alert alert-error">❌ 启动失败：' + escapeHtml((res && res.error) || "未知错误，请确认已安装插件") + '</div>';
    }
  });
}

function stopAutoPick() {
  sendToExtension({ action: "stopAutoPickTask" }, function() {
    var alertEl = document.getElementById("ap-alert");
    if (alertEl) alertEl.innerHTML = '<div class="alert alert-warning">⏹ 任务已停止</div>';
    if (window._autoPickPollingTimer) { clearInterval(window._autoPickPollingTimer); window._autoPickPollingTimer = null; }
    setTimeout(refreshAutoPickStatus, 500);
  });
}

document.addEventListener("keydown", function(e) {
  if (e.key !== "Enter") return;
  if (!document.getElementById("loginForm").classList.contains("hidden")) doLogin();
  else if (!document.getElementById("registerForm").classList.contains("hidden")) doRegister();
});

if (currentToken) {
  loadUser().then(function() { if (currentUser) showMain(); }).catch(function() {
    localStorage.removeItem("erp_token");
    currentToken = null;
  });
}
</script>
